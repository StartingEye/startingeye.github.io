# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# 언어 설정: 한국어로 변경
lang: ko

# 타임존 설정: 서울 기준
timezone: Asia/Seoul

# jekyll-seo-tag settings
# ↓ --------------------------

title: "보성의 보안 로그" # 블로그 메인 타이틀

tagline: "보안 전문가를 꿈꾸는 정보보안 학생의 기록" # 부제목

description: >- # 검색 엔진 노출용 설명
  ICT 대학교 정보보안학과 김보성입니다. 해킹 기술과 보안 지식을 기록하는 공간입니다.

# 본인의 GitHub 블로그 주소 (마지막에 / 를 넣지 마세요)
url: "https://startingeye.github.io"

github:
  username: StartingEye

# twitter는 사용하지 않는다면 비워두셔도 됩니다.
twitter:
  username: 

social:
  # Footer와 포스트 작성자로 표시될 이름
  name: "Kim BoSeong (StartingEye)"
  email: 250506@ict.ac.kr
  links:
    # 첫 번째 링크는 저작권 소유자 링크로 사용됩니다.
    - https://github.com/StartingEye
    # - https://twitter.com/StartingEye

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# (중략 - 분석 및 기타 설정은 기본값 유지)

# 사이드바에 표시될 아바타 이미지 주소
# 나중에 assets/img/ 폴더에 avatar.jpg를 넣으셔야 합니다.
avatar: "/assets/img/avatar.jpg"

# boolean type, 포스트에서 목차(TOC) 사용 여부
toc: true

# Chirpy 테마의 PWA(앱 설치) 기능 설정
pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

# 사이트의 기본 경로 (보통 비워둡니다)
baseurl: ""

# ------------ 이 아래 옵션들은 건드리지 않는 것을 권장합니다 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/